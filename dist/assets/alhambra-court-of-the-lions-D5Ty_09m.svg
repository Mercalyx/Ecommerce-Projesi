    <path d="M143 130 Q151 124 159 130 L161 164 Q153 172 144 164 L141 141Z" fill="url(#marble-shadow)"/>
    <path d="M87 159 Q97 154 107 161 L108 169 Q97 175 85 169Z" fill="url(#marble)"/>
