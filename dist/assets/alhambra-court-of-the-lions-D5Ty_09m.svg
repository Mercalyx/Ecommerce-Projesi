<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <title>Court of the Lions</title>
  <defs>
    <radialGradient id="backdrop" cx="32%" cy="24%" r="82%">
      <stop offset="0" stop-color="#FFF9EC"/>
      <stop offset=".58" stop-color="#F3E5DF"/>
      <stop offset="1" stop-color="#DEC5CF"/>
    </radialGradient>
    <linearGradient id="marble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFDF3"/>
      <stop offset=".48" stop-color="#EEE4D2"/>
      <stop offset="1" stop-color="#C9BCA7"/>
    </linearGradient>
    <linearGradient id="marble-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9DFCB"/>
      <stop offset="1" stop-color="#B9AA93"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEBA5"/>
      <stop offset=".55" stop-color="#DDB24D"/>
      <stop offset="1" stop-color="#A86E20"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CCF3EA"/>
      <stop offset="1" stop-color="#429D9A"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="rare-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <circle cx="120" cy="120" r="112" fill="url(#backdrop)"/>
  <path d="M38 139 C46 76 76 41 120 35 C164 41 194 76 202 139" fill="none" stroke="#7A1F2B" stroke-width="2.5" stroke-linecap="round" opacity=".10"/>
  <path d="M48 160 C58 101 82 66 120 57 C158 66 182 101 192 160" fill="none" stroke="#C49A48" stroke-width="2.5" stroke-linecap="round" opacity=".13"/>
  <ellipse cx="87" cy="53" rx="42" ry="24" fill="#FFFFFF" opacity=".28" transform="rotate(-20 87 53)"/>
  <ellipse cx="120" cy="205" rx="59" ry="9" fill="#5B3040" opacity=".20" filter="url(#soft-shadow)"/>

  <!-- Secret Rare museum radiance -->
  <circle cx="120" cy="105" r="72" fill="#F2CD6B" opacity=".18" filter="url(#rare-glow)"/>
  <circle cx="120" cy="105" r="67" fill="none" stroke="#D5A943" stroke-width="2.5" opacity=".46"/>
  <g fill="#E1B952">
