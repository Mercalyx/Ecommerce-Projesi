    <path d="M68 174 Q81 181 94 174 Q107 183 120 175 Q133 183 146 174 Q159 181 172 174" fill="none" stroke="#F6E3A1" stroke-width="2"/>
    <path d="M62 181 Q120 191 178 181 L169 194 Q120 202 71 194Z" fill="url(#marble-shadow)"/>
    <path d="M78 193 H162 L170 202 Q120 209 70 202Z" fill="url(#gold)"/>
    <path d="M102 185 H138 L133 194 H107Z" fill="#1F385E"/>
    <path d="M108 187 L120 182 L132 187 L120 192Z" fill="#E9C75E" stroke-width="2"/>
