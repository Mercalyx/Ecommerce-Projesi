<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <title>Nasrid Star</title>
  <defs>
    <radialGradient id="backdrop" cx="32%" cy="24%" r="82%">
      <stop offset="0" stop-color="#FFF9EC"/>
      <stop offset=".58" stop-color="#F3E5DF"/>
      <stop offset="1" stop-color="#DEC5CF"/>
    </radialGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#405986"/>
      <stop offset=".5" stop-color="#223A68"/>
      <stop offset="1" stop-color="#101D38"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF0AF"/>
      <stop offset=".48" stop-color="#E5BC55"/>
      <stop offset="1" stop-color="#A66B1E"/>
    </linearGradient>
    <radialGradient id="jewel" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#CBF2E4"/>
      <stop offset=".45" stop-color="#2E8A7E"/>
      <stop offset="1" stop-color="#15504E"/>
    </radialGradient>
    <filter id="soft-shadow" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="jewel-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <circle cx="120" cy="120" r="112" fill="url(#backdrop)"/>
  <path d="M38 139 C46 76 76 41 120 35 C164 41 194 76 202 139" fill="none" stroke="#7A1F2B" stroke-width="2.5" stroke-linecap="round" opacity=".10"/>
  <path d="M48 160 C58 101 82 66 120 57 C158 66 182 101 192 160" fill="none" stroke="#C49A48" stroke-width="2.5" stroke-linecap="round" opacity=".13"/>
  <ellipse cx="87" cy="53" rx="42" ry="24" fill="#FFFFFF" opacity=".28" transform="rotate(-20 87 53)"/>
  <ellipse cx="120" cy="205" rx="59" ry="9" fill="#5B3040" opacity=".20" filter="url(#soft-shadow)"/>

  <circle cx="120" cy="107" r="72" fill="#E7BD55" opacity=".14" filter="url(#jewel-glow)"/>
  <g fill="#D8AD48" opacity=".78">
    <circle cx="53" cy="102" r="3.5"/>
    <circle cx="187" cy="102" r="3.5"/>
    <path d="M70 55 C74 63 74 67 70 75 C66 67 66 63 70 55Z"/>
    <path d="M170 55 C174 63 174 67 170 75 C166 67 166 63 170 55Z"/>
  </g>

  <g stroke="#4D2A38" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Floating eight-point Nasrid jewel, built in deep layers -->
    <path d="M120 28 L137 57 L170 51 L164 84 L193 101 L164 118 L170 151 L137 145 L120 174 L103 145 L70 151 L76 118 L47 101 L76 84 L70 51 L103 57Z" fill="url(#gold)"/>
    <path d="M120 39 L133 66 L160 61 L155 88 L182 101 L155 114 L160 141 L133 136 L120 163 L107 136 L80 141 L85 114 L58 101 L85 88 L80 61 L107 66Z" fill="url(#navy)"/>

    <!-- Gold bevel segments create gemstone depth -->
    <path d="M120 28 L120 39 L107 66 L103 57Z" fill="#FFF1AF" stroke="none"/>
    <path d="M137 57 L133 66 L155 88 L164 84Z" fill="#F0D27C" stroke="none"/>
    <path d="M193 101 L182 101 L155 114 L164 118Z" fill="#C38A2D" stroke="none"/>
    <path d="M170 151 L160 141 L133 136 L137 145Z" fill="#A86D20" stroke="none"/>
    <path d="M120 174 L120 163 L107 136 L103 145Z" fill="#9E651C" stroke="none"/>
    <path d="M70 151 L80 141 L85 114 L76 118Z" fill="#D8A73D" stroke="none"/>
    <path d="M47 101 L58 101 L85 88 L76 84Z" fill="#F2D27A" stroke="none"/>
    <path d="M70 51 L80 61 L107 66 L103 57Z" fill="#FFE9A0" stroke="none"/>

    <!-- Second octagram and interlaced Nasrid geometry -->
    <path d="M120 57 L133 79 L158 74 L153 99 L175 112 L153 125 L158 150 L133 145 L120 167 L107 145 L82 150 L87 125 L65 112 L87 99 L82 74 L107 79Z" fill="none" stroke="#F0CF70" stroke-width="3" transform="translate(0 -11)"/>
    <path d="M120 67 L145 76 L154 101 L145 126 L120 135 L95 126 L86 101 L95 76Z" fill="#7A1F2B"/>
    <path d="M120 76 L138 83 L145 101 L138 119 L120 126 L102 119 L95 101 L102 83Z" fill="url(#gold)"/>
    <path d="M120 83 L130 91 L138 101 L130 111 L120 119 L110 111 L102 101 L110 91Z" fill="url(#navy)"/>

    <!-- Jewel facets and emerald heart -->
    <path d="M120 83 L120 101 L102 101 L110 91Z" fill="#506B96" stroke="none"/>
    <path d="M120 83 L130 91 L138 101 H120Z" fill="#1A2B50" stroke="none"/>
    <path d="M102 101 H120 V119 L110 111Z" fill="#172849" stroke="none"/>
    <path d="M120 101 H138 L130 111 L120 119Z" fill="#314A76" stroke="none"/>
    <path d="M120 88 L133 101 L120 114 L107 101Z" fill="url(#jewel)" stroke="#F9DF87"/>
    <path d="M113 99 L120 93 L127 99" fill="none" stroke="#E8FFFA" stroke-width="2" opacity=".75"/>

    <!-- Fine geometric engraving -->
    <path d="M120 45 V65 M120 137 V157 M64 101 H84 M156 101 H176" fill="none" stroke="#EBC96B" stroke-width="2"/>
    <path d="M86 67 L101 81 M139 121 L154 136 M154 67 L139 81 M101 121 L86 136" fill="none" stroke="#EBC96B" stroke-width="2"/>
    <circle cx="120" cy="45" r="3" fill="#7A1F2B" stroke="#F6DD89" stroke-width="2"/>
    <circle cx="176" cy="101" r="3" fill="#1F6E65" stroke="#F6DD89" stroke-width="2"/>
    <circle cx="120" cy="157" r="3" fill="#7A1F2B" stroke="#F6DD89" stroke-width="2"/>
    <circle cx="64" cy="101" r="3" fill="#1F6E65" stroke="#F6DD89" stroke-width="2"/>

    <!-- Discreet museum stand -->
    <path d="M115 168 H125 L130 185 H110Z" fill="url(#gold)"/>
    <path d="M91 184 H149 L156 196 Q120 204 84 196Z" fill="url(#navy)"/>
    <path d="M99 187 H141" fill="none" stroke="#EACA6C"/>
    <path d="M91 196 H149 L154 202 H86Z" fill="url(#gold)"/>
  </g>
</svg>
