    <path d="M61 67 C68 69 72 73 74 80 C67 78 63 74 61 67Z"/>
    <path d="M179 67 C172 69 168 73 166 80 C173 78 177 74 179 67Z"/>
    <circle cx="54" cy="118" r="4"/>
    <circle cx="186" cy="118" r="4"/>
